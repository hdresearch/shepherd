<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Descent</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #0b1f24;
    overflow: hidden;
  }
  .wrap {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 1200 900" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, Bap, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2630"/>
      <stop offset="1" stop-color="#081519"/>
    </linearGradient>
    <!-- Radial fills for contour bands (low loss = bright accent, high = dark) -->
    <radialGradient id="basin" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0f9f8f" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#0f9f8f" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0f9f8f" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- Arrowhead for the descent path -->
    <marker id="arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 L4,6 Z" fill="#f5f7f6"/>
    </marker>
  </defs>

  <!-- Panel background -->
  <rect x="0" y="0" width="1200" height="900" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="820" rx="26" fill="#0c222b" stroke="#16404a" stroke-width="2"/>

  <!-- Title -->
  <text x="80" y="120" fill="#eef3f2" font-size="56" font-weight="700">Gradient Descent</text>
  <rect x="82" y="142" width="190" height="6" rx="3" fill="#0f9f8f"/>

  <!-- Contour map group -->
  <g transform="translate(0,0)">
    <!-- Glow basin centered on the minimum (~640, 560) -->
    <ellipse cx="640" cy="560" rx="430" ry="290" fill="url(#basin)"/>

    <!-- Concentric contour rings: outer = high loss (warm/dim), inner = low loss (accent) -->
    <g fill="none" stroke-linejoin="round">
      <ellipse cx="640" cy="560" rx="430" ry="290" stroke="#3a5a52" stroke-width="2.5" opacity="0.7"/>
      <ellipse cx="640" cy="560" rx="362" ry="244" stroke="#3f6b5d" stroke-width="2.5" opacity="0.75"/>
      <ellipse cx="640" cy="560" rx="296" ry="200" stroke="#48806c" stroke-width="2.5" opacity="0.8"/>
      <ellipse cx="640" cy="560" rx="232" ry="158" stroke="#549d7e" stroke-width="2.5" opacity="0.85"/>
      <ellipse cx="640" cy="560" rx="170" ry="116" stroke="#5fb98c" stroke-width="2.5"/>
      <ellipse cx="640" cy="560" rx="110" ry="76" stroke="#6fd49c" stroke-width="2.5"/>
      <ellipse cx="640" cy="560" rx="56" ry="40" stroke="#8ff0b3" stroke-width="2.5"/>
    </g>

    <!-- Descent path: starts on a high outer ring, steps inward to the minimum -->
    <path d="M 320 360
             Q 420 400 470 452
             Q 520 504 560 506
             Q 600 508 600 540
             Q 600 572 624 556
             L 640 560"
          fill="none" stroke="#f5f7f6" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="0.1 22" opacity="0.9"/>

    <!-- Individual step arrows (downhill, toward minimum) -->
    <g stroke="#f5f7f6" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)">
      <line x1="320" y1="360" x2="452" y2="438"/>
      <line x1="452" y1="438" x2="548" y2="500"/>
      <line x1="548" y1="500" x2="606" y2="538"/>
      <line x1="606" y1="538" x2="636" y2="558"/>
    </g>

    <!-- Start marker (top-left, high loss) -->
    <circle cx="320" cy="360" r="16" fill="#f05d5e" stroke="#0c222b" stroke-width="4"/>
    <text x="320" y="328" fill="#ffd7d7" font-size="32" font-weight="600" text-anchor="middle">Start</text>

    <!-- A "Step" label on an intermediate point -->
    <circle cx="548" cy="500" r="10" fill="#f5f7f6"/>
    <text x="548" y="476" fill="#dfeae7" font-size="30" font-weight="600" text-anchor="middle">Step</text>

    <!-- Minimum marker -->
    <circle cx="640" cy="560" r="22" fill="none" stroke="#8ff0b3" stroke-width="3" filter="url(#soft)"/>
    <circle cx="640" cy="560" r="13" fill="#0f9f8f" stroke="#eafff4" stroke-width="3"/>
    <text x="640" y="618" fill="#c8f6dc" font-size="34" font-weight="700" text-anchor="middle">Minimum</text>
  </g>

  <!-- Caption -->
  <text x="600" y="812" fill="#9fc3bd" font-size="34" font-weight="500" text-anchor="middle">Small downhill steps reduce error.</text>
</svg>
</div>
</body>
</html>
