<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Descent</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #faf7f0;
  }
  .tile {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
<body>
<div class="tile">
  <svg viewBox="0 0 1200 900" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
    <defs>
      <!-- Background gradient -->
      <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fdfbf6"/>
        <stop offset="100%" stop-color="#f3ecdc"/>
      </linearGradient>
      <!-- Bowl / loss surface gradient -->
      <linearGradient id="bowl" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#986f0b" stop-opacity="0.10"/>
        <stop offset="100%" stop-color="#986f0b" stop-opacity="0.30"/>
      </linearGradient>
      <radialGradient id="minGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#986f0b" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#986f0b" stop-opacity="0"/>
      </radialGradient>
      <!-- Warm arrow gradient -->
      <linearGradient id="warm" x1="0" y1="1" x2="1" y2="0">
        <stop offset="0%" stop-color="#c84b62"/>
        <stop offset="100%" stop-color="#e8553a"/>
      </linearGradient>
      <!-- Repeated arrowhead marker -->
      <marker id="head" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M1 1 L11 6 L1 11 L4 6 Z" fill="#c84b62"/>
      </marker>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="1200" height="900" fill="url(#bg)"/>

    <!-- Title -->
    <text x="600" y="92" text-anchor="middle" font-size="58" font-weight="700" fill="#3d3320" letter-spacing="0.5">Gradient Descent</text>

    <!-- Chart frame baseline -->
    <line x1="150" y1="720" x2="1050" y2="720" stroke="#d8cca8" stroke-width="3"/>

    <!-- Loss surface (bowl/parabola) -->
    <path d="M 180 250
             Q 600 1000 1020 250
             L 1020 720 L 180 720 Z"
          fill="url(#bowl)" stroke="#986f0b" stroke-width="4" stroke-opacity="0.55"/>

    <!-- Minimum point glow + marker -->
    <circle cx="600" cy="668" r="70" fill="url(#minGlow)"/>
    <circle cx="600" cy="668" r="15" fill="#986f0b" stroke="#fdfbf6" stroke-width="4"/>
    <text x="600" y="772" text-anchor="middle" font-size="34" font-weight="600" fill="#7a5908">Minimum</text>

    <!-- WRONG DIRECTION: thick warm arrows climbing UP and AWAY from the minimum -->
    <!-- Each segment is an uphill "Step" moving away from the low point -->
    <g stroke="url(#warm)" stroke-width="18" fill="none" stroke-linecap="round" marker-end="url(#head)">
      <line x1="600" y1="640" x2="690" y2="540"/>
      <line x1="690" y1="540" x2="780" y2="445"/>
      <line x1="780" y1="445" x2="870" y2="355"/>
      <line x1="870" y1="355" x2="958" y2="275"/>
    </g>

    <!-- Start marker at the bottom (near minimum), path leaves from here -->
    <circle cx="600" cy="640" r="17" fill="#c84b62" stroke="#fdfbf6" stroke-width="4"/>
    <text x="548" y="612" text-anchor="end" font-size="34" font-weight="600" fill="#a83a4e">Start</text>

    <!-- Step label along the climbing path -->
    <text x="812" y="430" text-anchor="middle" font-size="32" font-weight="600" fill="#a83a4e" transform="rotate(-46 812 430)">Step</text>

    <!-- Caption -->
    <text x="600" y="852" text-anchor="middle" font-size="33" font-weight="500" fill="#5a4d30">Small downhill steps reduce error.</text>
  </svg>
</div>
</body>
</html>
