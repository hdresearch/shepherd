<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Descent</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0c1620;
  }
  .tile {
    width: 100%;
    height: 100%;
    display: flex;
  }
  svg {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
<body>
<div class="tile">
  <svg viewBox="0 0 1200 900" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <defs>
      <!-- Background gradient -->
      <radialGradient id="bg" cx="62%" cy="60%" r="80%">
        <stop offset="0%" stop-color="#13212e"/>
        <stop offset="100%" stop-color="#0a121b"/>
      </radialGradient>
      <!-- Contour fill gradients: outer (high loss) to inner (low loss) -->
      <radialGradient id="basin" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#0f9f8f" stop-opacity="0.55"/>
        <stop offset="55%" stop-color="#0f9f8f" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="#0f9f8f" stop-opacity="0.05"/>
      </radialGradient>
      <linearGradient id="path" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#f05d5e"/>
        <stop offset="100%" stop-color="#ffd27a"/>
      </linearGradient>
      <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#ffd27a"/>
      </marker>
      <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="1200" height="900" fill="url(#bg)"/>

    <!-- Title -->
    <text x="80" y="96" fill="#eef4f5" font-size="58" font-weight="700" letter-spacing="0.5">Gradient Descent</text>
    <rect x="82" y="118" width="300" height="6" rx="3" fill="#0f9f8f"/>

    <!-- Contour map: nested ellipses representing the loss surface basin -->
    <g transform="translate(720 500)">
      <!-- filled basin glow -->
      <ellipse cx="0" cy="0" rx="430" ry="330" fill="url(#basin)"/>

      <!-- contour rings (outer = high loss) -->
      <g fill="none" stroke="#0f9f8f" stroke-opacity="0.85">
        <ellipse cx="0" cy="0" rx="420" ry="320" stroke-width="2.5" stroke-opacity="0.30"/>
        <ellipse cx="-8" cy="-4" rx="345" ry="262" stroke-width="2.5" stroke-opacity="0.40"/>
        <ellipse cx="-14" cy="-8" rx="272" ry="205" stroke-width="2.5" stroke-opacity="0.52"/>
        <ellipse cx="-20" cy="-12" rx="200" ry="150" stroke-width="2.5" stroke-opacity="0.66"/>
        <ellipse cx="-24" cy="-14" rx="132" ry="98" stroke-width="2.5" stroke-opacity="0.80"/>
        <ellipse cx="-26" cy="-16" rx="70" ry="52" stroke-width="3" stroke-opacity="0.95"/>
      </g>

      <!-- Descent path: from outer high-loss start down into the basin minimum -->
      <path d="M 360 -250
               C 250 -150, 200 -120, 120 -70
               C 60 -32, 40 -10, -6 -14"
            fill="none" stroke="url(#path)" stroke-width="9" stroke-linecap="round"
            marker-end="url(#arrow)" filter="url(#soft)"/>

      <!-- step markers along the path (each a downhill step) -->
      <g fill="#ffd27a" stroke="#0c1620" stroke-width="2">
        <circle cx="360" cy="-250" r="11"/>
        <circle cx="232" cy="-150" r="9"/>
        <circle cx="138" cy="-86" r="8"/>
        <circle cx="58" cy="-34" r="7"/>
      </g>

      <!-- Start point -->
      <circle cx="360" cy="-250" r="16" fill="none" stroke="#f05d5e" stroke-width="4"/>
      <text x="384" y="-256" fill="#ffd27a" font-size="34" font-weight="700">Start</text>

      <!-- Step label -->
      <text x="150" y="-110" fill="#ffe2ad" font-size="30" font-weight="600">Step</text>

      <!-- Minimum point -->
      <circle cx="-26" cy="-16" r="14" fill="#0f9f8f" stroke="#eef4f5" stroke-width="3"/>
      <text x="-12" y="42" fill="#7fe7da" font-size="34" font-weight="700" text-anchor="middle" transform="translate(-26 0)">Minimum</text>
    </g>

    <!-- Caption -->
    <text x="80" y="838" fill="#cfe0e3" font-size="36" font-weight="500">Small downhill steps reduce error.</text>
  </svg>
</div>
</body>
</html>
